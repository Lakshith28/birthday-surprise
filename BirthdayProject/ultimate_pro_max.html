<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Crime Partner 💖</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:sans-serif; }
canvas { position:absolute; }

/* Text */
#title {
    position:absolute;
    width:100%;
    top:40%;
    text-align:center;
    font-size:40px;
    color:#ff4da6;
    opacity:0;
    text-shadow:0 0 20px #ff4da6;
    transition:1s;
}

/* Photo */
#photo {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:260px;
    border-radius:20px;
    box-shadow:0 0 40px pink;
    transition:1.5s;
}

/* Button */
#btn {
    position:absolute;
    top:70%;
    left:50%;
    transform:translateX(-50%);
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4da6;
    color:white;
    display:none;
}

/* Page2 */
#page2 {
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    color:white;
    text-align:center;
    padding-top:15%;
}

#typeText {
    width:80%;
    margin:auto;
    font-size:24px;
    white-space:pre-wrap;
    border-right:2px solid white;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="title">Happy Birthday Crime Partner 💖</div>
<img id="photo" src="photo.jpg">
<button id="btn">Next 💌</button>

<div id="page2">
<div id="typeText"></div>
</div>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

/* PARTICLES */
let particles = [];
for(let i=0;i<400;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height
    });
}

/* HEART */
function heart(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
    }
}

/* NAME FORMATION (EDIT NAME HERE) */
const name = "BESTIE";

/* TEXT → POINTS */
function textPoints(txt){
    let off = document.createElement("canvas");
    let c2 = off.getContext("2d");
    off.width = 500;
    off.height = 200;
    c2.fillStyle="white";
    c2.font="bold 80px Arial";
    c2.fillText(txt,50,120);

    let data = c2.getImageData(0,0,off.width,off.height).data;
    let pts=[];
    for(let y=0;y<off.height;y+=4){
        for(let x=0;x<off.width;x+=4){
            let i=(y*off.width+x)*4;
            if(data[i+3]>128){
                pts.push({
                    x:x+canvas.width/2-250,
                    y:y+canvas.height/2-100
                });
            }
        }
    }
    return pts;
}

let targets = textPoints(name);

/* ANIMATION STATES */
let stage = 0;
let frame = 0;

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        let t;

        if(stage===0){
            t = targets[i % targets.length]; // NAME
        }
        else{
            let h = heart(i*0.1);
            t = {
                x:canvas.width/2 + h.x*10,
                y:canvas.height/2 + h.y*10
            };
        }

        p.x += (t.x - p.x)*0.04;
        p.y += (t.y - p.y)*0.04;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle="#ff4da6";
        ctx.fill();
    });

    frame++;

    /* Switch to heart */
    if(frame===180) stage=1;

    requestAnimationFrame(animate);
}
animate();

/* TEXT */
setTimeout(()=>{
    document.getElementById("title").style.opacity=1;
},3500);

/* PHOTO */
setTimeout(()=>{
    document.getElementById("photo").style.transform="translate(-50%,-50%) scale(1)";
    fireworks();
},5500);

/* BUTTON */
setTimeout(()=>{
    document.getElementById("btn").style.display="block";
},7000);

/* FIREWORKS */
function fireworks(){
    for(let i=0;i<100;i++){
        let x=canvas.width/2;
        let y=canvas.height/2;

        let dx=(Math.random()-0.5)*10;
        let dy=(Math.random()-0.5)*10;

        setTimeout(()=>{
            ctx.beginPath();
            ctx.arc(x+dx*i,y+dy*i,2,0,Math.PI*2);
            ctx.fillStyle="yellow";
            ctx.fill();
        },i*20);
    }
}

/* NEXT */
document.getElementById("btn").onclick=()=>{
    document.getElementById("c").style.display="none";
    document.getElementById("title").style.display="none";
    document.getElementById("photo").style.display="none";
    document.getElementById("btn").style.display="none";
    document.getElementById("page2").style.display="block";
    typing();
};

/* MESSAGE */
const msg = `Happy Birthday to my partner in crime 💖🎉

Even though you’re 10 months younger than me, you’ve always been one of the most important people in my life 🥹 You’re not just my cousin… you’re my best friend, my safe place, and someone I can always count on ❤️

We’ve shared so many memories together — all the fun, fights, secrets, and stupid moments 😄✨ And honestly, life wouldn’t feel the same without you.

Nuvvu eppudu happy ga undali 😊
Nee life lo anni manchi jaragali 💫

No matter where we go or how much things change, I’ll always be there for you 💞

Happy Birthday once again 🎂
Love you so much ❤️✨`;

let i=0;
function typing(){
    if(i<msg.length){
        document.getElementById("typeText").innerHTML+=msg[i];
        i++;
        setTimeout(typing,30);
    }
}
</script>

</body>
</html>
